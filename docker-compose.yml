services:
  rails:
    build: .
    ports: ["3000:3000"]
    environment:
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - BINDING=0.0.0.0
      - POSTGRES_HOST=pg
      - POSTGRES_USER=sqily
      - POSTGRES_PASSWORD=password
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      pg:
        condition: service_healthy
    stdin_open: true
    tty: true

  pg:
    image: postgres:16
    environment:
      - POSTGRES_USER=sqily
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sqily_development
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqily -d sqily_development"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  bundle_cache:
